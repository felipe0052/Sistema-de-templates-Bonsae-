services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-bonsae}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?Defina MYSQL_ROOT_PASSWORD no .env da raiz}"
      MYSQL_USER: "${MYSQL_USER:?Defina MYSQL_USER no .env da raiz}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:?Defina MYSQL_PASSWORD no .env da raiz}"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: bonsae-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./back-end:/app
      - ./back-end/storage:/app/storage
    env_file:
      - ./back-end/.env
    depends_on:
      - db
    networks:
      - bonsae-network

  # Front-end Next.js
  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: bonsae-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./front-end:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./front-end/.env
    depends_on:
      - backend
    networks:
      - bonsae-network

  # Database MySQL
  db:
    image: mysql:8.0
    container_name: bonsae-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-bonsae}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-root}
    volumes:
      - bonsae-db-data:/var/lib/mysql
    networks:
      - bonsae-network

networks:
  bonsae-network:
    driver: bridge

volumes:
  bonsae-db-data:
