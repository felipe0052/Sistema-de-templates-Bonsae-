services:
  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: bonsae-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - path: ./back-end/.env
        required: false
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-bonsae}
      DB_USERNAME: ${DB_USERNAME:-bonsae}
      DB_PASSWORD: ${DB_PASSWORD:-bonsae}
      BONSAE_DB_DRIVER: mysql
      BONSAE_DB_HOST: db
      BONSAE_DB_PORT: "3306"
      BONSAE_DB_DATABASE: ${DB_DATABASE:-bonsae}
      BONSAE_DB_USERNAME: ${DB_USERNAME:-bonsae}
      BONSAE_DB_PASSWORD: ${DB_PASSWORD:-bonsae}
    depends_on:
      - db
    networks:
      - bonsae-network

  # Front-end Next.js
  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
      target: dev
    container_name: bonsae-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./front-end:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - bonsae-network

  # Database MySQL
  db:
    image: mysql:8.0
    container_name: bonsae-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-bonsae}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-bonsae}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bonsae}
    volumes:
      - bonsae-db-data:/var/lib/mysql
    networks:
      - bonsae-network

networks:
  bonsae-network:
    driver: bridge

volumes:
  bonsae-db-data:
